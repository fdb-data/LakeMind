# LakeMind v0.2.0 — 全系统统一 docker-compose（纯运行文件）
# 
# 正式部署：
#   docker compose --env-file .env pull
#   docker compose --env-file .env --profile ray --profile all up -d --no-build
#
# 本地开发（先 Bake 构建再启动）：
#   REGISTRY=lakemind VERSION=dev docker buildx bake core --load
#   docker compose -f docker-compose.yml -f docker-compose.build.yml --env-file .env --profile ray --profile all up -d --no-build

name: lakemind

networks:
  lakemind:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  asr-models:

services:
  # ══════════════════════════════════════════════════════════════
  # 1. 数据平面
  # ══════════════════════════════════════════════════════════════

  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:3.80}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-seaweedfs
    command: >-
      server
      -dir=/data
      -volume.max=100
      -s3
      -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "${SEAWEEFS_S3_PORT:-8333}:8333"
    volumes:
      - ./LakeMindServer/data/seaweedfs:/data
      - ./LakeMindServer/config/seaweedfs:/etc/seaweedfs:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres:
    image: ${LAKEMIND_REGISTRY}/postgres-age:${POSTGRES_AGE_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-postgres
    environment:
      POSTGRES_DB: ${PG_DB:-lakemind}
      POSTGRES_USER: ${PG_USER:-lakemind}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-lakemind_pass}
    command: >
      postgres
      -c max_connections=200
    volumes:
      - ./LakeMindServer/data/postgres:/var/lib/postgresql/data
      - ./LakeMindServer/docker/postgres-age/init:/docker-entrypoint-initdb.d:ro
    networks: [lakemind, internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-lakemind} -d ${PG_DB:-lakemind}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:8.0.9}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-valkey
    command: >-
      valkey-server
      --save 60 1
      --loglevel notice
    volumes:
      - ./LakeMindServer/data/valkey:/data
    networks: [lakemind, internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  server-api:
    image: ${LAKEMIND_REGISTRY}/server-api:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-server-api
    environment:
      LAKE_CONFIG: /etc/lakemind/engines.yaml
      API_KEY: "${SERVER_API_KEY}"
      SERVER_API_KEY: "${SERVER_API_KEY}"
      SERVER_API_URL: "http://lakemind-server-api:10823"
      LAKEMIND_MASTER_KEY: "${LAKEMIND_MASTER_KEY}"
      LAKEMIND_V2_AUTH: "${LAKEMIND_V2_AUTH:-1}"
      S3_ENDPOINT: "http://lakemind-seaweedfs:8333"
      MODEL_SERVING_URL: "http://lakemind-model-serving:10824"
      MODELSERVING_API_KEY: "${MODELSERVING_API_KEY:-lakemind-modelserving-key}"
      PG_HOST: lakemind-postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-lakemind}
      PG_USER: ${PG_USER:-lakemind}
      PG_PASSWORD: ${PG_PASSWORD:-lakemind_pass}
      DATABASE_URL: "postgresql+psycopg2://${PG_USER:-lakemind}:${PG_PASSWORD:-lakemind_pass}@lakemind-postgres:5432/${PG_DB:-lakemind}"
    ports:
      - "10823:10823"
    volumes:
      - ./LakeMindServer/config/engines.yaml:/etc/lakemind/engines.yaml:ro
      - ./LakeMindServer/data/lance:/data/lance
      - ./LakeMindServer/data/fastembed_cache:/tmp/fastembed_cache
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10823/api/v1/system/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ray-head:
    image: ${RAY_IMAGE}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-ray-head
    command: >
      ray start --head --port=6379 --dashboard-port=8265 --dashboard-host=0.0.0.0
      --num-cpus=${RAY_HEAD_CPUS:-4} --block
    volumes:
      - ./LakeMindServer/data/lance:/data/lance
    networks: [lakemind]
    profiles: [ray]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8265')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  ray-worker:
    image: ${RAY_IMAGE}
    pull_policy: ${PULL_POLICY:-missing}
    command: >
      ray start --address=lakemind-ray-head:6379
      --num-cpus=${RAY_WORKER_CPUS:-4} --block
    volumes:
      - ./LakeMindServer/data/lance:/data/lance
    depends_on:
      - ray-head
    networks: [lakemind]
    deploy:
      replicas: 2
    profiles: [ray]
    restart: unless-stopped

  # ══════════════════════════════════════════════════════════════
  # 2. 运行平面 — 3 MCP（同一 mcp-suite 镜像，不同 command）
  # ══════════════════════════════════════════════════════════════

  asset-mcp:
    profiles: [all]
    image: ${LAKEMIND_REGISTRY}/mcp-suite:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    command: ["python", "-m", "lakemind_asset_mcp"]
    container_name: lakemind-asset-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY}"
    ports:
      - "8401:8401"
    volumes:
      - ./LakeMindMCP/LakeMindAssetMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      server-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8401/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  data-mcp:
    profiles: [all]
    image: ${LAKEMIND_REGISTRY}/mcp-suite:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    command: ["python", "-m", "lakemind_data_mcp"]
    container_name: lakemind-data-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY}"
    ports:
      - "8402:8402"
    volumes:
      - ./LakeMindMCP/LakeMindDataMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      server-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8402/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  admin-mcp:
    profiles: [all]
    image: ${LAKEMIND_REGISTRY}/mcp-suite:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    command: ["python", "-m", "lakemind_admin_mcp"]
    container_name: lakemind-admin-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY}"
    ports:
      - "8403:8403"
    volumes:
      - ./LakeMindMCP/LakeMindAdminMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      server-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8403/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ══════════════════════════════════════════════════════════════
  # 3. 模型平面
  # ══════════════════════════════════════════════════════════════

  asr-model-init:
    image: ${LAKEMIND_REGISTRY}/model-serving:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-asr-model-init
    command: ["python", "-m", "lakemind_model_serving.tools.prefetch_asr"]
    environment:
      ASR_MODEL_DIR: /models/asr/faster-whisper-small
      ASR_MODEL_ID: "Systran/faster-whisper-small"
      ASR_MODEL_REVISION: "536b0662742c02347bc0e980a01041f333bce120"
      ASR_MODEL_BIN_SHA256: "3e305921506d8872816023e4c273e75d2419fb89b24da97b4fe7bce14170d671"
      HF_HUB_OFFLINE: "0"
    volumes:
      - asr-models:/models
    networks: [lakemind]
    restart: "no"
    profiles: ["model-download"]

  model-serving:
    image: ${LAKEMIND_REGISTRY}/model-serving:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-model-serving
    environment:
      LAKE_CONFIG: /etc/lakemind/models.yaml
      MODELSERVING_API_KEY: "${MODELSERVING_API_KEY:-lakemind-modelserving-key}"
      MAAS_API_KEY: "${MAAS_API_KEY}"
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      LITELLM_MODEL_COST_MAP_URL: ""
      HF_HUB_OFFLINE: "1"
      ASR_CONCURRENCY: "1"
      ASR_MAX_UPLOAD_MB: "100"
    ports:
      - "10824:10824"
    volumes:
      - ./LakeMindModelServing/config/models.yaml:/etc/lakemind/models.yaml:ro
      - ./LakeMindModelServing/data/fastembed_cache:/data/fastembed_cache
      - asr-models:/models
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10824/health/ready')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ══════════════════════════════════════════════════════════════
  # 4. 管理平面 — ControlCenter（单镜像）
  # ══════════════════════════════════════════════════════════════

  control-center:
    image: ${LAKEMIND_REGISTRY}/control-center:${LAKEMIND_VERSION}
    pull_policy: ${PULL_POLICY:-missing}
    container_name: lakemind-control-center
    environment:
      LAKEMIND_CONTROL_PLANE: "http://lakemind-server-api:10823"
      LAKEMIND_MODEL_SERVING: "http://lakemind-model-serving:10824"
      LAKEMIND_BFF_TOKEN: "${SERVER_API_KEY}"
      LAKEMIND_STEWARD_TOKEN: "${SERVER_API_KEY}"
      VALKEY_HOST: "lakemind-valkey"
      VALKEY_PORT: "6379"
      SESSION_TTL: "3600"
      SESSION_IDLE_TIMEOUT: "1800"
      SESSION_MAX_LIFETIME: "28800"
    ports:
      - "3000:3000"
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      server-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ══════════════════════════════════════════════════════════════
  # 4b. 管理平面 — Telemetry Agent（独立只读）
  # ══════════════════════════════════════════════════════════════

  telemetry-agent:
    build:
      context: ./LakeMindTelemetryAgent
    image: ${LAKEMIND_REGISTRY}/telemetry-agent:${LAKEMIND_VERSION}
    container_name: lakemind-telemetry-agent
    environment:
      LAKEMIND_SERVER_API: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY}"
      DATABASE_URL: "postgresql://lakemind:lakemind@lakemind-postgres:5432/lakemind"
      VALKEY_HOST: "lakemind-valkey"
      VALKEY_PORT: "6379"
      SEAWEEDFS_URL: "http://lakemind-seaweedfs:8333"
      RAY_DASHBOARD_URL: "http://lakemind-ray-head:8265"
      MODEL_SERVING_URL: "http://lakemind-model-serving:10824"
      TELEMETRY_INTERVAL: "60"
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      server-api:
        condition: service_healthy
