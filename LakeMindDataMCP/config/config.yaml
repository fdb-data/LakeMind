server:
  host: "0.0.0.0"
  port: 8402
  mcp_path: "/mcp"
  stateless: true

engines:
  s3:
    endpoint: "http://lakemind-seaweedfs:8333"
    access_key: "admin"
    secret_key: "admin123456"
    region: "us-east-1"
  postgres:
    host: "lakemind-postgres"
    port: 5432
    db: "lakemind"
    user: "lakemind"
    password: "lakemind_pass"
  dragonfly:
    host: "lakemind-dragonfly"
    port: 6379
    password: ""
  lance:
    uri: "/data/lance"
  iceberg:
    catalog_name: "lakemind"
    warehouse: "s3://lakemind-iceberg/warehouse"
    sql_uri: "postgresql+psycopg2://lakemind:lakemind_pass@lakemind-postgres:5432/lakemind"

embedding:
  provider: "fastembed"
  model: "BAAI/bge-small-en-v1.5"
  dim: 384

tokens:
  - token: "test-steward-token"
    agent_id: "steward"
    tenant_id: "platform"
    scopes: ["data"]

audit:
  level: "info"
  redact_keys: ["token", "api_key", "secret", "password", "content"]
