# LakeMind 运行平面编排 — Steward（管理 Agent）+ Monitor（人类仪表板）
# 依赖 LakeMindServer + LakeMindMCP 已启动（网络 lakemind_lakemind 已存在）
#
# 用法：
#   docker compose up -d --build
#   docker compose down

name: lakemind

networks:
  lakemind:
    external: true
    name: lakemind_lakemind

services:
  # ── Steward — 管理运维 Agent（LangGraph 巡检 + 对话式管理）──
  steward:
    build: ../LakeMindSteward
    container_name: lakemind-steward
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
    ports:
      - "8500:8500"
    volumes:
      - ../LakeMindSteward/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped

  # ── Monitor — 人类只读仪表板 + Steward 对话窗 ──
  monitor:
    build: .
    container_name: lakemind-monitor
    environment:
      ASSET_MCP_URL: "http://lakemind-asset-mcp:8401/mcp"
      DATA_MCP_URL: "http://lakemind-data-mcp:8402/mcp"
      ADMIN_MCP_URL: "http://lakemind-admin-mcp:8403/mcp"
      STEWARD_URL: "http://lakemind-steward:8500"
      ASSET_TOKEN: "test-monitor-token"
      ADMIN_TOKEN: "test-steward-token"
    ports:
      - "3000:3000"
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      - steward
