# LakeMind 运行时服务编排 — Steward + Monitor + ModelServing
# 依赖 LakeMindServer + LakeMindMCP 已启动（网络 lakemind-server_lakemind 已存在）
#
# 用法：
#   docker compose up -d --build
#   docker compose down

name: lakemind-runtime

networks:
  lakemind:
    external: true
    name: lakemind-server_lakemind

services:
  # ── Steward — 管理运维 Agent（LangGraph 巡检 + 对话式管理）──
  steward:
    image: lakemind-steward
    pull_policy: never
    container_name: lakemind-steward
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      MODELSERVING_API_KEY: "${MODELSERVING_API_KEY:-lakemind-modelserving-key}"
    ports:
      - "8500:8500"
    volumes:
      - ../LakeMindSteward/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8500/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── ModelServing — 统一模型服务（litellm + fastembed + FunASR）──
  model-serving:
    image: lakemind/model-serving:latest
    pull_policy: never
    container_name: lakemind-model-serving
    command: ["python", "-m", "lakemind_model_serving"]
    environment:
      LAKE_CONFIG: /etc/lakemind/models.yaml
      MODELSERVING_API_KEY: "${MODELSERVING_API_KEY:-lakemind-modelserving-key}"
      MAAS_API_KEY: "${MAAS_API_KEY}"
    ports:
      - "10824:10824"
    volumes:
      - ../LakeMindModelServing/config/models.yaml:/etc/lakemind/models.yaml:ro
      - ../LakeMindModelServing/data/fastembed_cache:/data/fastembed_cache
      - ../LakeMindModelServing/data/funasr_cache:/data/funasr_cache
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10824/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Monitor — 人类只读仪表板 + Steward 对话窗 ──
  monitor:
    image: lakemind-monitor
    pull_policy: never
    container_name: lakemind-monitor
    environment:
      ASSET_MCP_URL: "http://lakemind-asset-mcp:8401/mcp"
      DATA_MCP_URL: "http://lakemind-data-mcp:8402/mcp"
      ADMIN_MCP_URL: "http://lakemind-admin-mcp:8403/mcp"
      STEWARD_URL: "http://lakemind-steward:8500"
      ASSET_TOKEN: "test-business-token"
      DATA_TOKEN: "test-steward-token"
      ADMIN_TOKEN: "test-steward-token"
    ports:
      - "3000:3000"
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      steward:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/health').then(r=>{if(!r.ok)process.exit(1)})\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
