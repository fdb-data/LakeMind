<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LakeMind Monitor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; color: #333; }
  .header { background: #1a1a2e; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header nav { margin-left: auto; display: flex; gap: 8px; }
  .header nav a { color: #aaa; text-decoration: none; padding: 6px 14px; border-radius: 6px; font-size: 14px; transition: all .2s; }
  .header nav a:hover { color: #fff; background: rgba(255,255,255,.1); }
  .header nav a.active { color: #fff; background: rgba(255,255,255,.15); }
  .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .card h3 { font-size: 14px; color: #888; margin-bottom: 8px; }
  .card .value { font-size: 24px; font-weight: 700; }
  .status-card { text-align: center; }
  .status-card .icon { font-size: 28px; margin-bottom: 8px; }
  .status-ok { border-left: 4px solid #52c41a; }
  .status-error { border-left: 4px solid #ff4d4f; }
  .section { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  .section h2 { font-size: 18px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
  pre { background: #f5f7fa; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 13px; line-height: 1.6; max-height: 400px; overflow-y: auto; }
  .chat-box { border: 1px solid #e0e0e0; border-radius: 8px; height: 400px; overflow-y: auto; padding: 16px; background: #fafafa; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 6px; max-width: 80%; }
  .msg.user { background: #e6f7ff; margin-left: auto; text-align: right; }
  .msg.steward { background: #f6ffed; margin-right: auto; }
  .msg .role { font-size: 12px; color: #888; margin-bottom: 4px; }
  .chat-input { display: flex; gap: 12px; margin-top: 16px; }
  .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; }
  .chat-input button { padding: 10px 24px; background: #1890ff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  .chat-input button:hover { background: #40a9ff; }
  .chat-input button:disabled { background: #d9d9d9; cursor: not-allowed; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .badge-ok { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
  .badge-error { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
  .loading { color: #999; font-style: italic; }
  .actions { display: flex; gap: 8px; margin-bottom: 16px; }
  .actions button { padding: 6px 16px; background: #fff; border: 1px solid #d9d9d9; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .actions button:hover { border-color: #1890ff; color: #1890ff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th { text-align: left; padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #f0f0f0; font-weight: 600; }
  table td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; }
</style>
</head>
<body>
<div class="header">
  <h1>LakeMind Monitor</h1>
  <nav>
    <a href="#dashboard" data-page="dashboard">Dashboard</a>
    <a href="#asset" data-page="asset">Asset</a>
    <a href="#data" data-page="data">Data</a>
    <a href="#admin" data-page="admin">Admin</a>
    <a href="#chat" data-page="chat">Chat</a>
  </nav>
</div>
<div class="container" id="app"></div>

<script>
const API = {
  health: () => fetch('/api/health').then(r => r.json()),
  assetCaps: () => fetch('/api/asset/capabilities').then(r => r.json()),
  assetKb: () => fetch('/api/asset/knowledge').then(r => r.json()),
  assetSk: () => fetch('/api/asset/skills').then(r => r.json()),
  assetMem: () => fetch('/api/asset/memory').then(r => r.json()),
  assetOnt: () => fetch('/api/asset/ontology').then(r => r.json()),
  dataTables: () => fetch('/api/data/tables').then(r => r.json()),
  adminHealth: () => fetch('/api/admin/health').then(r => r.json()),
  adminTenants: () => fetch('/api/admin/tenants').then(r => r.json()),
  adminUsers: () => fetch('/api/admin/users').then(r => r.json()),
  adminTokens: () => fetch('/api/admin/tokens').then(r => r.json()),
  chat: (msg) => fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) }).then(r => r.json()),
  inspect: () => fetch('/api/inspect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' }).then(r => r.json()),
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function pretty(obj) { try { return JSON.stringify(obj, null, 2) } catch { return String(obj) } }
function badge(status) { return `<span class="badge ${status==='ok'?'badge-ok':'badge-error'}">${status}</span>` }

async function renderDashboard() {
  const app = document.getElementById('app')
  app.innerHTML = `
    <div class="section"><h2>Platform Health</h2><div class="grid" id="health-grid"><p class="loading">Loading...</p></div></div>
    <div class="section"><h2>Quick Stats</h2><div class="grid" id="stats-grid"><p class="loading">Loading...</p></div></div>
  `
  try {
    const h = await API.health()
    document.getElementById('health-grid').innerHTML = Object.entries(h).map(([k,v]) =>
      `<div class="card status-card ${v==='ok'?'status-ok':'status-error'}">
        <div class="icon">${v==='ok'?'✅':'❌'}</div>
        <h3>${k}</h3><div class="value">${badge(v)}</div>
      </div>`).join('')
  } catch { document.getElementById('health-grid').innerHTML = '<p class="loading">Failed to load</p>' }
  try {
    const caps = await API.assetCaps()
    const types = caps.asset_types || caps.types || []
    document.getElementById('stats-grid').innerHTML =
      `<div class="card"><h3>Asset Types</h3><div class="value">${types.length}</div></div>
       <div class="card"><h3>Services</h3><div class="value">${Object.keys(await API.health()).length}</div></div>`
  } catch { document.getElementById('stats-grid').innerHTML = '<p class="loading">Failed to load</p>' }
}

async function renderAsset() {
  const app = document.getElementById('app')
  app.innerHTML = `
    <div class="section"><h2>Capabilities</h2><pre id="caps" class="loading">Loading...</pre></div>
    <div class="section"><h2>Knowledge Bases</h2><pre id="kb" class="loading">Loading...</pre></div>
    <div class="section"><h2>Skills</h2><pre id="sk" class="loading">Loading...</pre></div>
    <div class="section"><h2>Memory</h2><pre id="mem" class="loading">Loading...</pre></div>
    <div class="section"><h2>Ontology</h2><pre id="ont" class="loading">Loading...</pre></div>
  `
  const load = async (id, fn) => { try { document.getElementById(id).textContent = pretty(await fn()) } catch(e) { document.getElementById(id).textContent = 'Error: ' + e } }
  load('caps', API.assetCaps); load('kb', API.assetKb); load('sk', API.assetSk); load('mem', API.assetMem); load('ont', API.assetOnt)
}

async function renderData() {
  const app = document.getElementById('app')
  app.innerHTML = `<div class="section"><h2>Tables</h2><pre id="tables" class="loading">Loading...</pre></div>`
  try { document.getElementById('tables').textContent = pretty(await API.dataTables()) }
  catch(e) { document.getElementById('tables').textContent = 'Error: ' + e }
}

async function renderAdmin() {
  const app = document.getElementById('app')
  app.innerHTML = `
    <div class="actions"><button onclick="renderAdmin()">Refresh</button></div>
    <div class="section"><h2>Platform Health</h2><pre id="h" class="loading">Loading...</pre></div>
    <div class="section"><h2>Tenants</h2><pre id="t" class="loading">Loading...</pre></div>
    <div class="section"><h2>Users</h2><pre id="u" class="loading">Loading...</pre></div>
    <div class="section"><h2>Tokens</h2><pre id="tok" class="loading">Loading...</pre></div>
  `
  const load = async (id, fn) => { try { document.getElementById(id).textContent = pretty(await fn()) } catch(e) { document.getElementById(id).textContent = 'Error: ' + e } }
  load('h', API.adminHealth); load('t', API.adminTenants); load('u', API.adminUsers); load('tok', API.adminTokens)
}

async function renderChat() {
  const app = document.getElementById('app')
  app.innerHTML = `
    <div class="section">
      <h2>Chat with Steward</h2>
      <div class="chat-box" id="msgs"></div>
      <div class="chat-input">
        <input id="inp" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button id="sendBtn" onclick="sendMsg()">Send</button>
      </div>
    </div>
    <div class="section">
      <h2>Inspection</h2>
      <div class="actions"><button onclick="runInspect()">Run Inspection</button></div>
      <pre id="inspect-result" class="loading">Click "Run Inspection" to start.</pre>
    </div>
  `
}

async function sendMsg() {
  const inp = document.getElementById('inp'), btn = document.getElementById('sendBtn'), msgs = document.getElementById('msgs')
  const m = inp.value.trim(); if (!m) return
  msgs.innerHTML += `<div class="msg user"><div class="role">You</div>${esc(m)}</div>`
  inp.value = ''; btn.disabled = true; btn.textContent = '...'
  msgs.scrollTop = msgs.scrollHeight
  try {
    const r = await API.chat(m)
    msgs.innerHTML += `<div class="msg steward"><div class="role">Steward</div>${esc(r.reply || r.message || pretty(r))}</div>`
  } catch(e) {
    msgs.innerHTML += `<div class="msg steward"><div class="role">Steward</div>未就绪</div>`
  }
  btn.disabled = false; btn.textContent = 'Send'
  msgs.scrollTop = msgs.scrollHeight
}

async function runInspect() {
  const el = document.getElementById('inspect-result')
  el.textContent = 'Running inspection...'; el.className = 'loading'
  try {
    const r = await API.inspect()
    el.textContent = pretty(r); el.className = ''
  } catch(e) { el.textContent = 'Error: ' + e; el.className = '' }
}

const pages = { dashboard: renderDashboard, asset: renderAsset, data: renderData, admin: renderAdmin, chat: renderChat }
function route() {
  const page = location.hash.slice(1) || 'dashboard'
  document.querySelectorAll('.header nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page))
  ;(pages[page] || pages.dashboard)()
}
window.addEventListener('hashchange', route)
route()
</script>
</body>
</html>
