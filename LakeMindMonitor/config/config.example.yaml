# LakeMindMonitor 配置示例。复制为 config.yaml 后按需修改。
# 运行时通过环境变量 LAKE_CONFIG 指定配置文件路径。

server:
  host: "0.0.0.0"
  port: 3000

mcp:
  url: "http://lakemind-mcp:8400/mcp"
  read_token: "test-monitor-token"   # data scope 只读 Token

steward:
  url: ""                            # 可选；留空则 chat 走只读直连降级
  token: ""

refresh:
  health_interval_sec: 10
