name: Build

on:
  push:
    branches: [master, main, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - 'reports/**'
      - 'LICENSE'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'
      - 'reports/**'
      - 'LICENSE'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAMESPACE: fdb-data/lakemind

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [postgres-age, server-api, mcp-suite, model-serving, control-center]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          targets: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          set: |
            *.REGISTRY=${{ env.REGISTRY }}/${{ env.NAMESPACE }}
            *.VERSION=${{ github.sha }}
            *.cache-from=type=gha,scope=${{ matrix.target }}
            *.cache-to=type=gha,mode=max,scope=${{ matrix.target }}

  meeting-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: examples/meeting-agent
          file: examples/meeting-agent/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/meeting-agent:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/meeting-agent:${{ github.sha }}
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=meeting-agent
          cache-to: type=gha,mode=max,scope=meeting-agent
