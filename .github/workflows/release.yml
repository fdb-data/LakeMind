name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  NAMESPACE: fdb-data/lakemind

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - id: set-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

  server-api:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindServer
          file: LakeMindServer/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/server-api:v${{ needs.determine-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/server-api:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

  postgres-age:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindServer/docker/postgres-age
          file: LakeMindServer/docker/postgres-age/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/postgres-age:16
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ray:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindServer
          file: LakeMindServer/Dockerfile.ray
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/ray:2.41.0-py3.12
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  asset-mcp:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindMCP/LakeMindAssetMCP
          file: LakeMindMCP/LakeMindAssetMCP/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/asset-mcp:v${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  data-mcp:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindMCP/LakeMindDataMCP
          file: LakeMindMCP/LakeMindDataMCP/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/data-mcp:v${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  admin-mcp:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindMCP/LakeMindAdminMCP
          file: LakeMindMCP/LakeMindAdminMCP/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/admin-mcp:v${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  monitor:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindMonitor
          file: LakeMindMonitor/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/monitor:v${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  steward:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindSteward
          file: LakeMindSteward/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/steward:v${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  model-serving:
    needs: [determine-version, server-api]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: LakeMindModelServing
          file: LakeMindModelServing/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/model-serving:v${{ needs.determine-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/model-serving:latest
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-contexts: |
            lakemind/server-api:latest=docker-image://${{ env.REGISTRY }}/${{ env.NAMESPACE }}/server-api:latest

  meeting-agent:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: examples/meeting-agent
          file: examples/meeting-agent/Dockerfile
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/meeting-agent:v${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 汇总：生成 SBOM + GitHub Release ──
  finalize:
    needs: [determine-version, server-api, postgres-age, ray, asset-mcp, data-mcp, admin-mcp, monitor, steward, model-serving, meeting-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release summary
        run: |
          cat > release-notes.md << 'EOF'
          ## LakeMind v${{ needs.determine-version.outputs.version }}

          ### Docker Images (GHCR)
          | Image | Tag |
          |-------|-----|
          | server-api | `v${{ needs.determine-version.outputs.version }}` |
          | postgres-age | `16` |
          | ray | `2.41.0-py3.12` |
          | model-serving | `v${{ needs.determine-version.outputs.version }}` |
          | asset-mcp | `v${{ needs.determine-version.outputs.version }}` |
          | data-mcp | `v${{ needs.determine-version.outputs.version }}` |
          | admin-mcp | `v${{ needs.determine-version.outputs.version }}` |
          | monitor | `v${{ needs.determine-version.outputs.version }}` |
          | steward | `v${{ needs.determine-version.outputs.version }}` |
          | meeting-agent | `v${{ needs.determine-version.outputs.version }}` |

          ```bash
          docker pull ghcr.io/fdb-data/lakemind/server-api:v${{ needs.determine-version.outputs.version }}
          ```
          EOF
      - name: Create or update GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
