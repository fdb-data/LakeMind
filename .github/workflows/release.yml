name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  NAMESPACE: fdb-data/lakemind

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - id: set-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target: [postgres-age, server-api, mcp-suite, model-serving, control-center]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/bake-action@v5
        with:
          files: docker-bake.hcl
          targets: ${{ matrix.target }}
          push: true
          set: |
            *.REGISTRY=${{ env.REGISTRY }}/${{ env.NAMESPACE }}
            *.VERSION=${{ needs.determine-version.outputs.version }}
            *.cache-from=type=gha,scope=${{ matrix.target }}
            *.cache-to=type=gha,mode=max,scope=${{ matrix.target }}

  meeting-agent:
    needs: determine-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: examples/meeting-agent
          file: examples/meeting-agent/Dockerfile
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/meeting-agent:${{ needs.determine-version.outputs.version }}
          push: true
          cache-from: type=gha,scope=meeting-agent
          cache-to: type=gha,mode=max,scope=meeting-agent

  finalize:
    needs: [determine-version, build, meeting-agent]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          cat > release-notes.md << EOF
          # LakeMind v${VERSION}

          ## 镜像清单

          | 镜像 | 标签 |
          |------|------|
          | postgres-age | ${VERSION} |
          | server-api | ${VERSION} |
          | mcp-suite | ${VERSION} |
          | model-serving | ${VERSION} |
          | control-center | ${VERSION} |
          | meeting-agent | ${VERSION} |

          ## 第三方镜像

          | 镜像 | 版本 |
          |------|------|
          | SeaweedFS | 3.101 |
          | PostgreSQL | 16 |
          | Valkey | 8.0.9 |
          | Ray | 2.41.0-py312 |
          EOF
      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push'
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false
