# LakeMind v0.2.0 Control Center — 前端 + BFF + Steward
# 依赖 LakeMindServer + LakeMindMCP 已启动（网络 lakemind-server_lakemind 已存在）
#
# 用法：
#   docker compose up -d --build
#   docker compose down

name: lakemind-controlcenter

networks:
  lakemind:
    external: true
    name: lakemind-server_lakemind

services:
  # ── BFF — Control Center 后端 BFF（FastAPI）──
  control-center-bff:
    build: ./bff
    image: lakemind/control-center-bff:latest
    container_name: lakemind-cc-bff
    environment:
      LAKEMIND_CONTROL_PLANE: "http://lakemind-server-api:10823"
      LAKEMIND_BFF_TOKEN: "${SERVER_API_KEY:-lakemind-internal-api-key}"
    ports:
      - "3001:3001"
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      - control-center-steward
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Steward — 受控治理 Agent（v0.2.0 三级动作模型）──
  control-center-steward:
    build: ./steward
    image: lakemind/control-center-steward:latest
    container_name: lakemind-cc-steward
    environment:
      LAKEMIND_CONTROL_PLANE: "http://lakemind-server-api:10823"
      LAKEMIND_MODEL_SERVING: "http://lakemind-model-serving:10824"
      LAKEMIND_STEWARD_TOKEN: "${SERVER_API_KEY:-lakemind-internal-api-key}"
    ports:
      - "3002:3002"
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Frontend — Control Center 前端（React + AntD）──
  control-center-frontend:
    build: ./frontend
    image: lakemind/control-center-frontend:latest
    container_name: lakemind-cc-frontend
    environment:
      VITE_BFF_URL: "http://localhost:3001"
    ports:
      - "3000:3000"
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      control-center-bff:
        condition: service_healthy
