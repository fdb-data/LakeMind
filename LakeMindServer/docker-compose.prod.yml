# ====================================================================
# LakeMind 生产环境 docker-compose
# 使用：docker compose -f docker-compose.prod.yml --env-file .env --profile ray up -d
#
# 与开发版的区别：
#   - 资源限制（CPU / 内存 limits）
#   - 日志轮转（max-size + max-file）
#   - PostgreSQL 连接池调优 + WAL 配置
#   - Valkey AOF 持久化
#   - 健康检查间隔收紧
#   - restart: always（而非 unless-stopped）
# ====================================================================

name: lakemind-server

networks:
  lakemind:
    driver: bridge

services:
  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: lakemind-seaweedfs
    command: >-
      server
      -dir=/data
      -volume.max=200
      -s3
      -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "${SEAWEEFS_S3_PORT:-8333}:8333"
    volumes:
      - ./data/seaweedfs:/data
      - ./config/seaweedfs:/etc/seaweedfs:ro
    networks: [lakemind]
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8333/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    build:
      context: ./docker/postgres-age
    image: lakemind/postgres-age:16
    container_name: lakemind-postgres
    environment:
      POSTGRES_DB: ${PG_DB:-lakemind}
      POSTGRES_USER: ${PG_USER:-lakemind}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-lakemind_pass}
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=512MB
      -c effective_cache_size=2GB
      -c wal_level=replica
      -c max_wal_size=2GB
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres-age/init:/docker-entrypoint-initdb.d:ro
    networks: [lakemind]
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "10" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-lakemind} -d ${PG_DB:-lakemind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:8.0}
    container_name: lakemind-valkey
    command: >-
      valkey-server
      --save 60 100
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
    ulimits:
      memlock: -1
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - ./data/valkey:/data
    networks: [lakemind]
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  server-api:
    build: .
    image: lakemind/server-api:latest
    container_name: lakemind-server-api
    environment:
      LAKE_CONFIG: /etc/lakemind/engines.yaml
      API_KEY: "${SERVER_API_KEY:-lakemind-internal-api-key}"
      LAKEMIND_MASTER_KEY: "${LAKEMIND_MASTER_KEY}"
      S3_ENDPOINT: "http://lakemind-seaweedfs:8333"
      MODEL_SERVING_URL: "http://lakemind-model-serving:10824"
    ports:
      - "10823:10823"
    volumes:
      - ./config/engines.yaml:/etc/lakemind/engines.yaml:ro
      - ./data/lance:/data/lance
      - ./data/fastembed_cache:/tmp/fastembed_cache
    networks: [lakemind]
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      valkey:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "10" }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10823/api/v1/system/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ray-head:
    image: ${RAY_IMAGE:-lakemind/ray:2.41.0-py3.12}
    container_name: lakemind-ray-head
    command: >
      ray start --head --port=6379 --dashboard-port=8265 --dashboard-host=0.0.0.0
      --num-cpus=${RAY_HEAD_CPUS:-4} --block
    ports:
      - "${RAY_DASHBOARD_PORT:-8265}:8265"
    volumes:
      - ./data/lance:/data/lance
    networks: [lakemind]
    profiles: [ray]
    restart: always
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8265')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  ray-worker:
    image: ${RAY_IMAGE:-lakemind/ray:2.41.0-py3.12}
    command: >
      ray start --address=lakemind-ray-head:6379
      --num-cpus=${RAY_WORKER_CPUS:-4} --block
    volumes:
      - ./data/lance:/data/lance
    depends_on:
      - ray-head
    networks: [lakemind]
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    profiles: [ray]
    restart: always
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "5" }
