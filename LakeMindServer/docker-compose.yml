# LakeMind v0.2.0 — 数据平面 docker-compose
#   PostgreSQL 16 + AGE 作为统一 Metadata Hub（替代 Gravitino + SQLite）
#   Ray 集群用于分布式计算
#   v0.2.0 新增：Alembic migration + V2 Auth + Control Plane 表
#
# 启动：docker compose --env-file .env --profile ray up -d

name: lakemind-server

networks:
  lakemind:
    driver: bridge
  internal:
    driver: bridge
    internal: true

# 数据卷采用 bind mount，统一挂到 ./data/ 下：
#   ./data/seaweedfs   SeaweedFS 数据
#   ./data/postgres    PostgreSQL 数据
#   ./data/valkey      Valkey RDB/AOF
#   ./data/lance       Lance 向量/多模态共享（多 Agent / Ray worker 挂载同一目录）

services:
  # ------------------------------------------------------------------
  # 统一存储底座：SeaweedFS（S3 兼容）
  # ------------------------------------------------------------------
  seaweedfs:
    image: ${SEAWEEDFS_IMAGE:-chrislusf/seaweedfs:latest}
    container_name: lakemind-seaweedfs
    command: >-
      server
      -dir=/data
      -volume.max=100
      -s3
      -s3.config=/etc/seaweedfs/s3.json
    ports:
      - "${SEAWEEFS_MASTER_PORT:-9333}:9333"
      - "${SEAWEEFS_VOLUME_PORT:-8080}:8080"
      - "${SEAWEEFS_FILER_PORT:-8888}:8888"
      - "${SEAWEEFS_S3_PORT:-8333}:8333"
    volumes:
      - ./data/seaweedfs:/data
      - ./config/seaweedfs:/etc/seaweedfs:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8333/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ------------------------------------------------------------------
  # 统一 Metadata Hub：PostgreSQL 16 + Apache AGE
  #   · Iceberg SQL Catalog（替代 SQLite）
  #   · AGE 图存储（本体、graphRAG、mem0 实体图谱）
  #   · 用户/租户/Token/资产定义/Fileset 元数据
  # ------------------------------------------------------------------
  postgres:
    build:
      context: ./docker/postgres-age
    image: lakemind/postgres-age:16
    container_name: lakemind-postgres
    environment:
      POSTGRES_DB: ${PG_DB:-lakemind}
      POSTGRES_USER: ${PG_USER:-lakemind}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-lakemind_pass}
    command: >
      postgres
      -c max_connections=200
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres-age/init:/docker-entrypoint-initdb.d:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-lakemind} -d ${PG_DB:-lakemind}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ------------------------------------------------------------------
  # 短期/工作记忆：Valkey（TTL KV，Redis 兼容，BSD 3-Clause）
  # ------------------------------------------------------------------
  valkey:
    image: ${VALKEY_IMAGE:-valkey/valkey:8.0}
    container_name: lakemind-valkey
    command: >-
      valkey-server
      --save 60 1
      --loglevel notice
    ulimits:
      memlock: -1
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - ./data/valkey:/data
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ------------------------------------------------------------------
  # v0.2.0 Alembic Migration init（one-shot）
  #   PG 启动后运行 alembic upgrade head，创建 v0.2.0 Control Plane + Asset + Job + Model 表
  # ------------------------------------------------------------------
  migrate:
    build: .
    image: lakemind/server-api:latest
    container_name: lakemind-migrate
    command: >
      bash -c "cd /app && alembic upgrade head"
    environment:
      LAKE_CONFIG: /etc/lakemind/engines.yaml
      PG_HOST: lakemind-postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-lakemind}
      PG_USER: ${PG_USER:-lakemind}
      PG_PASSWORD: ${PG_PASSWORD:-lakemind_pass}
      LAKEMIND_MASTER_KEY: "${LAKEMIND_MASTER_KEY}"
    volumes:
      - ./config/engines.yaml:/etc/lakemind/engines.yaml:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./migrations:/app/migrations:ro
    networks: [lakemind]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ------------------------------------------------------------------
  # REST API 网关：统一引擎入口，MCP 通过此 API 访问全部数据能力
  #   v0.2.0：LAKEMIND_V2_AUTH=1 启用 RBAC 中间件
  # ------------------------------------------------------------------
  server-api:
    build: .
    image: lakemind/server-api:latest
    container_name: lakemind-server-api
    environment:
      LAKE_CONFIG: /etc/lakemind/engines.yaml
      API_KEY: "${SERVER_API_KEY:-lakemind-internal-api-key}"
      LAKEMIND_MASTER_KEY: "${LAKEMIND_MASTER_KEY}"
      LAKEMIND_V2_AUTH: "${LAKEMIND_V2_AUTH:-1}"
      S3_ENDPOINT: "http://lakemind-seaweedfs:8333"
      MODEL_SERVING_URL: "http://lakemind-model-serving:10824"
      PG_HOST: lakemind-postgres
      PG_PORT: 5432
      PG_DB: ${PG_DB:-lakemind}
      PG_USER: ${PG_USER:-lakemind}
      PG_PASSWORD: ${PG_PASSWORD:-lakemind_pass}
    ports:
      - "10823:10823"
    volumes:
      - ./config/engines.yaml:/etc/lakemind/engines.yaml:ro
      - ./data/lance:/data/lance
      - ./data/fastembed_cache:/tmp/fastembed_cache
    networks: [lakemind]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10823/api/v1/system/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ------------------------------------------------------------------
  # 分布式计算：Ray 集群（head + 2 worker）
  #   批量 Embedding · 分布式向量检索 · 重型 SQL · mem0 事实抽取 LLM
  # ------------------------------------------------------------------
  ray-head:
    image: ${RAY_IMAGE:-lakemind/ray:2.41.0-py3.12}
    container_name: lakemind-ray-head
    command: >
      ray start --head --port=6379 --dashboard-port=8265 --dashboard-host=0.0.0.0
      --num-cpus=${RAY_HEAD_CPUS:-4} --block
    ports:
      - "${RAY_DASHBOARD_PORT:-8265}:8265"
    volumes:
      - ./data/lance:/data/lance
    networks: [lakemind]
    profiles: [ray]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8265')\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  ray-worker:
    image: ${RAY_IMAGE:-lakemind/ray:2.41.0-py3.12}
    command: >
      ray start --address=lakemind-ray-head:6379
      --num-cpus=${RAY_WORKER_CPUS:-4} --block
    volumes:
      - ./data/lance:/data/lance
    depends_on:
      - ray-head
    networks: [lakemind]
    deploy:
      replicas: 2
    profiles: [ray]
    restart: unless-stopped
