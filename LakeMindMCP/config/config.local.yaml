# 本地集成测试配置（指向 LakeMindServer 已发布的 localhost 端口）。
server:
  host: "127.0.0.1"
  port: 8400
  mcp_path: "/mcp"
  stateless: true
  asset_cache_ttl: 30

engines:
  s3:
    endpoint: "http://localhost:8333"
    access_key: "admin"
    secret_key: "admin123456"
    region: "us-east-1"
  gravitino:
    uri: "http://localhost:8090"
    metalake: "lakemind_metalake"
  dragonfly:
    host: "localhost"
    port: 6379
    password: ""
  lance:
    uri: "../LakeMindServer/data/lance"
  iceberg:
    catalog_name: "lakemind"
    warehouse: "s3://lakemind-iceberg/warehouse"
    sql_uri: "sqlite:////tmp/lakemind-mcp-catalog.db"

embedding:
  base_url: "http://localhost:8081/v1"
  model: "bge-small-zh"
  api_key: "test"
  dim: 512
  fallback_base_url: ""

tokens:
  - token: "test-business-token"
    agent_id: "agent-business-01"
    tenant_id: "retail"
    scopes: ["data"]
  - token: "test-steward-token"
    agent_id: "steward"
    tenant_id: "platform"
    scopes: ["admin", "data"]

audit:
  level: "info"
  redact_keys: ["token", "api_key", "secret", "password", "content"]
