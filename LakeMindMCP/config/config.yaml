# LakeMindMCP 容器化运行配置（对接 LakeMindServer 容器网络）。
server:
  host: "0.0.0.0"
  port: 8400
  mcp_path: "/mcp"
  stateless: true
  asset_cache_ttl: 30

engines:
  s3:
    endpoint: "http://lakemind-seaweedfs:8333"
    access_key: "admin"
    secret_key: "admin123456"
    region: "us-east-1"
  gravitino:
    uri: "http://lakemind-gravitino:8090"
    metalake: "lakemind_metalake"
  dragonfly:
    host: "lakemind-dragonfly"
    port: 6379
    password: ""
  lance:
    uri: "/data/lance"
  iceberg:
    catalog_name: "lakemind"
    warehouse: "s3://lakemind-iceberg/warehouse"
    sql_uri: "sqlite:////var/lib/lakemind/catalog.db"

embedding:
  # 缺省本地 embedding（零依赖、零外部服务，开箱即用）
  provider: "local"
  dim: 512
  # 切外部服务时改 provider: openai_compatible 并填 base_url/model/api_key
  base_url: ""
  model: ""
  api_key: ""
  fallback_base_url: ""

tokens:
  - token: "test-business-token"
    agent_id: "agent-business-01"
    tenant_id: "retail"
    scopes: ["data"]
  - token: "test-steward-token"
    agent_id: "steward"
    tenant_id: "platform"
    scopes: ["admin", "data"]
  - token: "test-monitor-token"
    agent_id: "monitor"
    tenant_id: "platform"
    scopes: ["data"]

audit:
  level: "info"
  redact_keys: ["token", "api_key", "secret", "password", "content"]
