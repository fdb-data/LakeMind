# LakeMindMCP 服务编排。
# 依赖 LakeMindServer 已启动并创建外部网络 `lakemind_lakemind`。
# 启动顺序：
#   1. cd LakeMindServer && docker compose --env-file .env up -d
#   2. cd LakeMindMCP   && docker compose up -d --build

name: lakemind

services:
  lakemind-mcp:
    build: .
    container_name: lakemind-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
    ports:
      - "${MCP_PORT:-8400}:8400"
    volumes:
      - ./config/config.yaml:/etc/lakemind/config.yaml:ro
      # 共享 Lance 向量目录（与 LakeMindServer/data/lance 同一卷）
      - ../LakeMindServer/data/lance:/data/lance
      # PyIceberg SQL catalog 本地元数据库
      - lakemind-catalog:/var/lib/lakemind
    networks:
      - lakemind
    restart: unless-stopped

volumes:
  lakemind-catalog:

networks:
  lakemind:
    external: true
    name: lakemind_lakemind
