# LakeMind MCP 服务编排 — 3 个 MCP 打成一个包
# 依赖 LakeMindServer 已启动（网络 lakemind_lakemind 已存在）
#
# 用法：
#   全部启动：  docker compose --profile all up -d --build
#   仅 Asset：  docker compose --profile asset up -d --build
#   仅 Data：   docker compose --profile data  up -d --build
#   仅 Admin：  docker compose --profile admin up -d --build
#   Asset+Data：docker compose --profile asset --profile data up -d --build
#   停止：      docker compose --profile all down

name: lakemind

networks:
  lakemind:
    external: true
    name: lakemind_lakemind

services:
  # ── AssetMCP — 资产面（知识/记忆/技能/本体）──
  asset-mcp:
    profiles: [asset, all]
    build: ../LakeMindAssetMCP
    container_name: lakemind-asset-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "lakemind-internal-api-key"
    ports:
      - "8401:8401"
    volumes:
      - ../LakeMindAssetMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped

  # ── DataMCP — 数据面（Iceberg/LanceDB/DuckDB/S3/KV/Graph 透传）──
  data-mcp:
    profiles: [data, all]
    build: ../LakeMindDataMCP
    container_name: lakemind-data-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "lakemind-internal-api-key"
    ports:
      - "8402:8402"
    volumes:
      - ../LakeMindDataMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped

  # ── AdminMCP — 管理面（租户/用户/Token/资产类型/平台健康）──
  admin-mcp:
    profiles: [admin, all]
    build: ../LakeMindAdminMCP
    container_name: lakemind-admin-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "lakemind-internal-api-key"
    ports:
      - "8403:8403"
    volumes:
      - ../LakeMindAdminMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
