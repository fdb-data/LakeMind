# LakeMind 运行平面编排 — 3 个 MCP 服务
# 依赖 LakeMindServer 已启动（网络 lakemind_lakemind 已存在）
#
# 用法：
#   docker compose --profile all up -d --build
#   docker compose --profile all down

name: lakemind

networks:
  lakemind:
    external: true
    name: lakemind_lakemind

services:
  # ── AssetMCP — 认知资产面（知识/记忆/技能/本体）──
  asset-mcp:
    profiles: [all]
    build: ./LakeMindAssetMCP
    image: lakemind/asset-mcp:0.1.0
    container_name: lakemind-asset-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY:-lakemind-internal-api-key}"
    ports:
      - "8401:8401"
    volumes:
      - ./LakeMindAssetMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8401/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── DataMCP — 数据面全量透传 ──
  data-mcp:
    profiles: [all]
    build: ./LakeMindDataMCP
    image: lakemind/data-mcp:0.1.0
    container_name: lakemind-data-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY:-lakemind-internal-api-key}"
    ports:
      - "8402:8402"
    volumes:
      - ./LakeMindDataMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8402/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── AdminMCP — 管理面（用户/租户/Token/健康）──
  admin-mcp:
    profiles: [all]
    build: ./LakeMindAdminMCP
    image: lakemind/admin-mcp:0.1.0
    container_name: lakemind-admin-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "${SERVER_API_KEY:-lakemind-internal-api-key}"
    ports:
      - "8403:8403"
    volumes:
      - ./LakeMindAdminMCP/config:/etc/lakemind:ro
    networks: [lakemind]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8403/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
