server:
  host: "0.0.0.0"
  port: 8402
  mcp_path: "/mcp"
  stateless: true

tokens:
  - token: "test-steward-token"
    agent_id: "steward"
    tenant_id: "platform"
    scopes: ["data"]
  - token: "meeting-agent-mcp-token"
    agent_id: "meeting-agent"
    tenant_id: "examples-meeting-agent"
    scopes: ["data"]

audit:
  level: "info"
  redact_keys: ["token", "api_key", "secret", "password", "content"]
