embedding:
  built_in:
    enabled: true
    provider: "fastembed"
    model: "jinaai/jina-embeddings-v2-base-zh"
    dim: 768
    cache_dir: "/data/fastembed_cache"
  external: []
    # - model_id: "text-embedding-3-small"
    #   provider: "openai"
    #   litellm_model: "openai/text-embedding-3-small"
    #   api_key: "${OPENAI_API_KEY}"
    #   dim: 1536

asr:
  built_in:
    enabled: true
    required: false
    preload: true
    provider: "faster-whisper"
    model_alias: "whisper-small"
    model_id: "Systran/faster-whisper-small"
    model_revision: "536b0662742c02347bc0e980a01041f333bce120"
    model_path: "/models/asr/faster-whisper-small"
    language: "auto"
    device: "cpu"
    compute_type: "int8"
    cpu_threads: 4
    num_workers: 1
    concurrency: 1
    beam_size: 5
    vad_filter: true
    vad_min_silence_duration_ms: 500
    condition_on_previous_text: false
    word_timestamps: false
    max_upload_mb: 100
    request_timeout_seconds: 600
  external: []
    # - model_id: "whisper-api"
    #   endpoint: "https://api.openai.com/v1/audio/transcriptions"
    #   api_key: "${OPENAI_API_KEY}"

registry:
  host: "lakemind-postgres"
  port: 5432
  db: "lakemind"
  user: "lakemind"
  password: "lakemind_pass"
