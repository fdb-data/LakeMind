openapi: 3.1.0
info:
  title: LakeMind API
  version: 1.0.0
  description: |
    LakeMind v0.2.0 REST API — 统一认知资产管理与受控 Job Runtime。
    所有端点（除 /health）需要 Bearer Token 认证。
    X-Tenant-Id / X-Agent-Id / X-Scopes 不再由调用方声明，由 Token 解析得到。
  contact:
    name: LakeMind Team
servers:
  - url: http://localhost:10823
    description: Local development
  - url: http://lakemind-server:10823
    description: Docker internal

security:
  - BearerAuth: []

tags:
  - name: Assets
    description: 资产生命周期管理
  - name: Knowledge
    description: 知识库摄入与检索
  - name: Skills
    description: Skill 注册、发布与检索
  - name: Memory
    description: 记忆管理（mem0 风格 8 方法）
  - name: Jobs
    description: Job 提交与管理
  - name: Operations
    description: 异步操作与审批
  - name: Models
    description: 模型定义、部署与路由
  - name: Configuration
    description: 配置管理与版本
  - name: Security
    description: 身份、Token、Secret
  - name: Audit
    description: 审计事件查询
  - name: Instances
    description: 实例注册与健康
  - name: Health
    description: 平台健康检查

paths:
  # ────────────── Health ──────────────
  /api/v1/health:
    get:
      tags: [Health]
      security: []
      summary: 平台健康检查
      operationId: getHealth
      responses:
        '200':
          description: 健康
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ────────────── Assets ──────────────
  /api/v1/assets:
    post:
      tags: [Assets]
      summary: 创建资产
      operationId: createAsset
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssetRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Assets]
      summary: 资产列表
      operationId: listAssets
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/AssetType'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AssetStatus'
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseAsset'

  /api/v1/assets/{asset_id}:
    get:
      tags: [Assets]
      summary: 资产详情
      operationId: getAsset
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Assets]
      summary: 更新资产元数据
      operationId: updateAsset
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAssetRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'
    delete:
      tags: [Assets]
      summary: 删除资产（异步 Operation）
      operationId: deleteAsset
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 异步删除已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  /api/v1/assets/{asset_id}/bindings:
    get:
      tags: [Assets]
      summary: Binding 列表
      operationId: getAssetBindings
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Binding 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Binding'

  /api/v1/assets/{asset_id}/lineage:
    get:
      tags: [Assets]
      summary: 资产血缘
      operationId: getAssetLineage
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: 血缘图
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LineageGraph'

  /api/v1/assets/{asset_id}/reindex:
    post:
      tags: [Assets]
      summary: 重建索引（异步 Operation）
      operationId: reindexAsset
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 重建已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  # ────────────── Knowledge ──────────────
  /api/v1/knowledge:
    post:
      tags: [Knowledge]
      summary: 摄入知识（异步 Operation）
      operationId: ingestKnowledge
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestKnowledgeRequest'
      responses:
        '202':
          description: 摄入已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'
    get:
      tags: [Knowledge]
      summary: 知识库列表
      operationId: listKnowledge
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseKnowledgeBase'

  /api/v1/knowledge/search:
    post:
      tags: [Knowledge]
      summary: 知识检索
      operationId: searchKnowledge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchKnowledgeRequest'
      responses:
        '200':
          description: 检索结果
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'

  /api/v1/knowledge/{kb_name}:
    get:
      tags: [Knowledge]
      summary: 知识库详情
      operationId: getKnowledgeBase
      parameters:
        - $ref: '#/components/parameters/KbName'
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeBase'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Knowledge]
      summary: 删除知识库（异步 Operation）
      operationId: deleteKnowledgeBase
      parameters:
        - $ref: '#/components/parameters/KbName'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 删除已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  /api/v1/knowledge/{kb_name}/{concept_id}:
    get:
      tags: [Knowledge]
      summary: 概念详情
      operationId: getConcept
      parameters:
        - $ref: '#/components/parameters/KbName'
        - name: concept_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 概念
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Concept'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/knowledge/{kb_name}/reindex:
    post:
      tags: [Knowledge]
      summary: 重建知识库索引（异步 Operation）
      operationId: reindexKnowledge
      parameters:
        - $ref: '#/components/parameters/KbName'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: 重建已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  # ────────────── Skills ──────────────
  /api/v1/skills:
    post:
      tags: [Skills]
      summary: 注册 Skill（DRAFT）
      operationId: registerSkill
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterSkillRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
    get:
      tags: [Skills]
      summary: Skill 列表
      operationId: listSkills
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseSkill'

  /api/v1/skills/search:
    post:
      tags: [Skills]
      summary: Skill 语义检索
      operationId: searchSkills
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchSkillsRequest'
      responses:
        '200':
          description: 检索结果
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchResult'

  /api/v1/skills/{name}/{version}:
    get:
      tags: [Skills]
      summary: Skill 详情
      operationId: getSkill
      parameters:
        - $ref: '#/components/parameters/SkillName'
        - $ref: '#/components/parameters/SkillVersion'
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/skills/{name}/{version}/publish:
    post:
      tags: [Skills]
      summary: 发布 Skill（不可变）
      operationId: publishSkill
      parameters:
        - $ref: '#/components/parameters/SkillName'
        - $ref: '#/components/parameters/SkillVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 发布成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/skills/{name}/{version}/revoke:
    post:
      tags: [Skills]
      summary: 撤销 Skill
      operationId: revokeSkill
      parameters:
        - $ref: '#/components/parameters/SkillName'
        - $ref: '#/components/parameters/SkillVersion'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: 撤销成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Skill'

  # ────────────── Memory ──────────────
  /api/v1/memories:
    post:
      tags: [Memory]
      summary: 添加 Memory
      operationId: addMemory
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemoryRequest'
      responses:
        '201':
          description: 添加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
    get:
      tags: [Memory]
      summary: Memory 列表
      operationId: listMemories
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseMemory'

  /api/v1/memories/search:
    post:
      tags: [Memory]
      summary: Memory 检索
      operationId: searchMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchMemoryRequest'
      responses:
        '200':
          description: 检索结果
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Memory'

  /api/v1/memories/{memory_id}:
    get:
      tags: [Memory]
      summary: Memory 详情
      operationId: getMemory
      parameters:
        - $ref: '#/components/parameters/MemoryId'
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Memory]
      summary: 更新 Memory
      operationId: updateMemory
      parameters:
        - $ref: '#/components/parameters/MemoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
              required: [content]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Memory'
    delete:
      tags: [Memory]
      summary: 删除 Memory
      operationId: deleteMemory
      parameters:
        - $ref: '#/components/parameters/MemoryId'
      responses:
        '204':
          description: 删除成功

  /api/v1/memories/clear:
    post:
      tags: [Memory]
      summary: 批量清除 Memory
      operationId: clearMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filters:
                  type: object
      responses:
        '200':
          description: 清除结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: integer

  /api/v1/memories/{memory_id}/history:
    get:
      tags: [Memory]
      summary: Memory 历史
      operationId: getMemoryHistory
      parameters:
        - $ref: '#/components/parameters/MemoryId'
      responses:
        '200':
          description: 历史列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemoryEvent'

  # ────────────── Jobs ──────────────
  /api/v1/jobs:
    post:
      tags: [Jobs]
      summary: 提交 Job
      operationId: submitJob
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitJobRequest'
      responses:
        '201':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'
    get:
      tags: [Jobs]
      summary: Job 列表
      operationId: listJobs
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/JobStatus'
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseJobRun'

  /api/v1/jobs/{job_id}:
    get:
      tags: [Jobs]
      summary: Job 详情
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/jobs/{job_id}/cancel:
    post:
      tags: [Jobs]
      summary: 取消 Job
      operationId: cancelJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'

  /api/v1/jobs/{job_id}/retry:
    post:
      tags: [Jobs]
      summary: 重试 Job（新 Attempt）
      operationId: retryJob
      parameters:
        - $ref: '#/components/parameters/JobId'
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: 重试已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRun'

  /api/v1/jobs/{job_id}/result:
    get:
      tags: [Jobs]
      summary: Job 结果
      operationId: getJobResult
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: 结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'

  /api/v1/jobs/{job_id}/attempts:
    get:
      tags: [Jobs]
      summary: Job Attempt 列表
      operationId: getJobAttempts
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Attempt 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobAttempt'

  # ────────────── Operations ──────────────
  /api/v1/operations:
    post:
      tags: [Operations]
      summary: 创建 Operation
      operationId: createOperation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOperationRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
    get:
      tags: [Operations]
      summary: Operation 列表
      operationId: listOperations
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OperationStatus'
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseOperation'

  /api/v1/operations/{op_id}:
    get:
      tags: [Operations]
      summary: Operation 详情
      operationId: getOperation
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/operations/{op_id}/approve:
    post:
      tags: [Operations]
      summary: 审批 Operation
      operationId: approveOperation
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: 审批成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'

  /api/v1/operations/{op_id}/cancel:
    post:
      tags: [Operations]
      summary: 取消 Operation
      operationId: cancelOperation
      parameters:
        - $ref: '#/components/parameters/OperationId'
      responses:
        '200':
          description: 取消成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'

  # ────────────── Models ──────────────
  /api/v1/models:
    post:
      tags: [Models]
      summary: 创建模型定义
      operationId: createModel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDefinition'
    get:
      tags: [Models]
      summary: 模型列表
      operationId: listModels
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelDefinition'

  /api/v1/models/{model_id}/deployments:
    post:
      tags: [Models]
      summary: 创建 Deployment
      operationId: createDeployment
      parameters:
        - $ref: '#/components/parameters/ModelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeploymentRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelDeployment'
    get:
      tags: [Models]
      summary: Deployment 列表
      operationId: listDeployments
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ModelDeployment'

  /api/v1/models/deployments/{dpl_id}/enable:
    post:
      tags: [Models]
      summary: 启用 Deployment
      operationId: enableDeployment
      parameters:
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '202':
          description: 启用已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  /api/v1/models/deployments/{dpl_id}/disable:
    post:
      tags: [Models]
      summary: 禁用 Deployment
      operationId: disableDeployment
      parameters:
        - $ref: '#/components/parameters/DeploymentId'
      responses:
        '202':
          description: 禁用已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  /api/v1/models/profiles:
    post:
      tags: [Models]
      summary: 创建模型 Profile
      operationId: createModelProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProfileRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelProfile'

  /api/v1/models/profiles/{name}/resolve:
    get:
      tags: [Models]
      summary: 解析 Profile 路由
      operationId: resolveProfile
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 解析结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolvedRoute'

  # ────────────── Configuration ──────────────
  /api/v1/configuration:
    get:
      tags: [Configuration]
      summary: 获取有效配置
      operationId: getEffectiveConfig
      responses:
        '200':
          description: 有效配置
          content:
            application/json:
              schema:
                type: object

  /api/v1/configuration/{scope}:
    get:
      tags: [Configuration]
      summary: 按作用域获取配置
      operationId: getConfig
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 配置值
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [Configuration]
      summary: 设置配置（产生 Revision）
      operationId: setConfig
      parameters:
        - name: scope
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                key:
                  type: string
                value: {}
                reason:
                  type: string
              required: [key, value, reason]
      responses:
        '201':
          description: Revision 已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigRevision'

  /api/v1/configuration/revisions:
    get:
      tags: [Configuration]
      summary: Revision 历史
      operationId: listConfigRevisions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: scope
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Revision 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseConfigRevision'

  /api/v1/configuration/revisions/{rev_id}/activate:
    post:
      tags: [Configuration]
      summary: 激活 Revision
      operationId: activateConfigRevision
      parameters:
        - $ref: '#/components/parameters/RevisionId'
      responses:
        '202':
          description: 激活已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  /api/v1/configuration/revisions/{rev_id}/rollback:
    post:
      tags: [Configuration]
      summary: 回滚 Revision
      operationId: rollbackConfigRevision
      parameters:
        - $ref: '#/components/parameters/RevisionId'
      responses:
        '202':
          description: 回滚已提交
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'

  # ────────────── Security ──────────────
  /api/v1/security/tokens:
    post:
      tags: [Security]
      summary: 签发 Token
      operationId: issueToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueTokenRequest'
      responses:
        '201':
          description: 签发成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
    get:
      tags: [Security]
      summary: Token 列表
      operationId: listTokens
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Token'

  /api/v1/security/tokens/{token_id}:
    delete:
      tags: [Security]
      summary: 撤销 Token
      operationId: revokeToken
      parameters:
        - name: token_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 撤销成功

  /api/v1/security/roles:
    get:
      tags: [Security]
      summary: 角色列表
      operationId: listRoles
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'

  /api/v1/security/secrets:
    post:
      tags: [Security]
      summary: 创建 Secret
      operationId: createSecret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSecretRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretRef'
    get:
      tags: [Security]
      summary: Secret 元数据列表
      operationId: listSecrets
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecretMetadata'

  /api/v1/security/secrets/{name}/rotate:
    post:
      tags: [Security]
      summary: 轮换 Secret
      operationId: rotateSecret
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 轮换成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecretRef'

  # ────────────── Audit ──────────────
  /api/v1/audit:
    get:
      tags: [Audit]
      summary: 查询审计事件
      operationId: queryAudit
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: event_type
          in: query
          schema:
            type: string
        - name: principal
          in: query
          schema:
            type: string
        - name: resource
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 审计事件列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseAuditEvent'

  /api/v1/audit/export:
    get:
      tags: [Audit]
      summary: 导出审计事件
      operationId: exportAudit
      parameters:
        - name: event_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 导出流
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ────────────── Instances ──────────────
  /api/v1/instances:
    get:
      tags: [Instances]
      summary: 实例列表
      operationId: listInstances
      responses:
        '200':
          description: 列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Instance'

  /api/v1/instances/{instance_id}:
    get:
      tags: [Instances]
      summary: 实例详情
      operationId: getInstance
      parameters:
        - name: instance_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Instance'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    IdempotencyKey:
      name: X-Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: 幂等键（24h 内相同 Principal + 相同 Key 返回缓存响应）
    AssetId:
      name: asset_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^ast_[0-9A-HJKMNP-TV-Z]{26}$'
    KbName:
      name: kb_name
      in: path
      required: true
      schema:
        type: string
    SkillName:
      name: name
      in: path
      required: true
      schema:
        type: string
    SkillVersion:
      name: version
      in: path
      required: true
      schema:
        type: string
    MemoryId:
      name: memory_id
      in: path
      required: true
      schema:
        type: string
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^job_[0-9A-HJKMNP-TV-Z]{26}$'
    OperationId:
      name: op_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^op_[0-9A-HJKMNP-TV-Z]{26}$'
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: string
    DeploymentId:
      name: dpl_id
      in: path
      required: true
      schema:
        type: string
    RevisionId:
      name: rev_id
      in: path
      required: true
      schema:
        type: string

  responses:
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: 冲突
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: 校验失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              enum:
                - AUTHENTICATION_FAILED
                - TOKEN_REVOKED
                - PERMISSION_DENIED
                - TENANT_SCOPE_VIOLATION
                - RESOURCE_NOT_FOUND
                - ASSET_NOT_READY
                - ASSET_DEGRADED
                - ASSET_FAILED
                - SKILL_NOT_PUBLISHED
                - SKILL_VERSION_IMMUTABLE
                - JOB_RESOURCE_DENIED
                - JOB_NOT_FOUND
                - MODEL_DEPLOYMENT_UNAVAILABLE
                - EMBEDDING_SPACE_MISMATCH
                - CONFIG_REVISION_CONFLICT
                - OPERATION_APPROVAL_REQUIRED
                - OPERATION_NOT_APPROVED
                - IDEMPOTENCY_CONFLICT
                - VALIDATION_FAILED
                - RATE_LIMITED
                - INTERNAL_ERROR
                - UPSTREAM_TIMEOUT
            message:
              type: string
            request_id:
              type: string
            resource_id:
              type: string
            resource_status:
              type: string
            retryable:
              type: boolean
            details:
              type: object
            correlation_id:
              type: string

    AssetType:
      type: string
      enum: [knowledge, skill, memory]
    AssetStatus:
      type: string
      enum: [CREATING, PROCESSING, READY, DEGRADED, FAILED, DELETED]
    JobStatus:
      type: string
      enum: [PENDING, RUNNING, SUCCEEDED, FAILED, CANCELLED, LOST]
    OperationStatus:
      type: string
      enum: [PENDING, APPROVAL_REQUIRED, APPROVED, RUNNING, SUCCEEDED, FAILED, CANCELLED]

    Asset:
      type: object
      properties:
        asset_id:
          type: string
        tenant_id:
          type: string
        type:
          $ref: '#/components/schemas/AssetType'
        name:
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        metadata:
          type: object
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateAssetRequest:
      type: object
      required: [type, name, source]
      properties:
        type:
          $ref: '#/components/schemas/AssetType'
        name:
          type: string
        source:
          type: object
        metadata:
          type: object

    UpdateAssetRequest:
      type: object
      properties:
        metadata:
          type: object

    Binding:
      type: object
      properties:
        binding_id:
          type: string
        asset_id:
          type: string
        kind:
          type: string
        status:
          type: string
        required:
          type: boolean

    LineageGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
        edges:
          type: array
          items:
            type: object

    KnowledgeBase:
      type: object
      properties:
        name:
          type: string
        asset_id:
          type: string
        status:
          $ref: '#/components/schemas/AssetStatus'
        concept_count:
          type: integer

    Concept:
      type: object
      properties:
        concept_id:
          type: string
        kb_name:
          type: string
        content:
          type: string
        metadata:
          type: object

    IngestKnowledgeRequest:
      type: object
      required: [name, content, source_type]
      properties:
        name:
          type: string
        content:
          type: string
        source_type:
          type: string
        parser:
          type: string

    SearchKnowledgeRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        kb_name:
          type: string
        filters:
          type: object
        top_k:
          type: integer
          default: 5

    SearchResult:
      type: object
      properties:
        id:
          type: string
        score:
          type: number
        content:
          type: string
        metadata:
          type: object

    Skill:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED, REVOKED]
        manifest:
          type: object
        created_at:
          type: string
          format: date-time

    RegisterSkillRequest:
      type: object
      required: [manifest, code_package]
      properties:
        manifest:
          type: object
        code_package:
          type: string
          format: binary

    SearchSkillsRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        top_k:
          type: integer
          default: 5

    Memory:
      type: object
      properties:
        memory_id:
          type: string
        content:
          type: string
        metadata:
          type: object
        created_at:
          type: string
          format: date-time

    AddMemoryRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            type: object
        metadata:
          type: object

    SearchMemoryRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        filters:
          type: object
        top_k:
          type: integer
          default: 10

    MemoryEvent:
      type: object
      properties:
        event_id:
          type: string
        event:
          type: string
        old_memory:
          type: string
        new_memory:
          type: string
        created_at:
          type: string
          format: date-time

    JobRun:
      type: object
      properties:
        job_id:
          type: string
        tenant_id:
          type: string
        skill_ref:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        params:
          type: object
        created_at:
          type: string
          format: date-time

    SubmitJobRequest:
      type: object
      required: [skill_ref, inputs]
      properties:
        skill_ref:
          type: string
        inputs:
          type: object
        params:
          type: object
        model_profile:
          type: string
        resource_overrides:
          type: object

    JobAttempt:
      type: object
      properties:
        attempt_id:
          type: string
        job_id:
          type: string
        status:
          $ref: '#/components/schemas/JobStatus'
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time

    Artifact:
      type: object
      properties:
        artifact_id:
          type: string
        job_id:
          type: string
        uri:
          type: string
        size:
          type: integer

    Operation:
      type: object
      properties:
        operation_id:
          type: string
        type:
          type: string
        target_resource:
          type: string
        initiator_id:
          type: string
        status:
          $ref: '#/components/schemas/OperationStatus'
        risk_level:
          type: string
          enum: [LOW, MEDIUM, HIGH]
        created_at:
          type: string
          format: date-time

    CreateOperationRequest:
      type: object
      required: [type, target, reason, risk_level]
      properties:
        type:
          type: string
        target:
          type: string
        reason:
          type: string
        risk_level:
          type: string
          enum: [LOW, MEDIUM, HIGH]

    AsyncOperationResponse:
      type: object
      properties:
        operation_id:
          type: string
        resource_id:
          type: string
        status:
          type: string
        message:
          type: string

    ModelDefinition:
      type: object
      properties:
        model_id:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [llm, embedding, asr]

    CreateModelRequest:
      type: object
      required: [name, kind]
      properties:
        name:
          type: string
        kind:
          type: string
          enum: [llm, embedding, asr]
        config:
          type: object

    ModelDeployment:
      type: object
      properties:
        deployment_id:
          type: string
        model_id:
          type: string
        status:
          type: string
          enum: [ENABLED, DISABLED, UNHEALTHY]

    CreateDeploymentRequest:
      type: object
      required: [config]
      properties:
        config:
          type: object

    ModelProfile:
      type: object
      properties:
        name:
          type: string
        route_config:
          type: object

    CreateProfileRequest:
      type: object
      required: [name, route_config]
      properties:
        name:
          type: string
        route_config:
          type: object

    ResolvedRoute:
      type: object
      properties:
        deployment_id:
          type: string
        endpoint:
          type: string

    ConfigRevision:
      type: object
      properties:
        revision_id:
          type: string
        scope:
          type: string
        status:
          type: string
          enum: [DRAFT, ACTIVE, ROLLED_BACK]
        created_at:
          type: string
          format: date-time

    Token:
      type: object
      properties:
        token_id:
          type: string
        token:
          type: string
        agent_id:
          type: string
        tenant_id:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    IssueTokenRequest:
      type: object
      required: [agent_id, tenant_id, scopes]
      properties:
        agent_id:
          type: string
        tenant_id:
          type: string
        scopes:
          type: array
          items:
            type: string

    Role:
      type: object
      properties:
        role_id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            type: string

    SecretRef:
      type: object
      properties:
        ref:
          type: string
        scope:
          type: string
        name:
          type: string

    SecretMetadata:
      type: object
      properties:
        scope:
          type: string
        name:
          type: string
        version:
          type: integer
        created_at:
          type: string
          format: date-time

    CreateSecretRequest:
      type: object
      required: [scope, name, value]
      properties:
        scope:
          type: string
        name:
          type: string
        value:
          type: string

    AuditEvent:
      type: object
      properties:
        event_id:
          type: string
        event_type:
          type: string
        principal:
          type: string
        resource:
          type: string
        action:
          type: string
        result:
          type: string
        details:
          type: object
        created_at:
          type: string
          format: date-time

    Instance:
      type: object
      properties:
        instance_id:
          type: string
        kind:
          type: string
        status:
          type: string
        endpoint:
          type: string

    HealthResponse:
      type: object
      properties:
        status:
          type: string
        engines:
          type: object

    PageResponseAsset:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Asset'
    PageResponseKnowledgeBase:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/KnowledgeBase'
    PageResponseSkill:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Skill'
    PageResponseMemory:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Memory'
    PageResponseJobRun:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/JobRun'
    PageResponseOperation:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Operation'
    PageResponseConfigRevision:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ConfigRevision'
    PageResponseAuditEvent:
      allOf:
        - $ref: '#/components/schemas/PageResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/AuditEvent'

    PageResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        has_next:
          type: boolean
