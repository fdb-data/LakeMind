name: lakemind

services:
  asset-mcp:
    build: .
    container_name: lakemind-asset-mcp
    environment:
      LAKE_CONFIG: /etc/lakemind/config.yaml
      SERVER_API_URL: "http://lakemind-server-api:10823"
      SERVER_API_KEY: "lakemind-internal-api-key"
    ports:
      - "8401:8401"
    volumes:
      - ./config:/etc/lakemind:ro
      - ../LakeMindServer/data/lance:/data/lance
    networks: [lakemind]
    restart: unless-stopped

networks:
  lakemind:
    external: true
    name: lakemind_lakemind
